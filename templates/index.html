
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analyzer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(
                135deg,
                #667eea,
                #764ba2,
                #6a11cb
            );
            font-family: 'Segoe UI', sans-serif;
        }

        .glass-card{
            width:100%;
            max-width:750px;
            padding:35px;
            border-radius:25px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border:1px solid rgba(255,255,255,0.2);
            box-shadow:0 8px 32px rgba(0,0,0,0.2);
            color:white;
        }

        .title{
            font-weight:700;
            margin-bottom:10px;
        }

        

        textarea{
            border:none !important;
            border-radius:15px !important;
            padding:15px !important;
            resize:none;
            min-height:140px;
        }

        textarea:focus{
            box-shadow:none !important;
        }

        .btn-predict{
            background:white;
            color:#6a11cb;
            border:none;
            border-radius:12px;
            padding:12px 30px;
            font-weight:600;
            transition:0.3s;
        }

        .btn-predict:hover{
            transform:translateY(-3px);
            background:#f3f3f3;
        }

        .result-card{
            margin-top:25px;
            padding:20px;
            border-radius:15px;
            background:rgba(255,255,255,0.12);
        }

        .emoji{
            font-size:55px;
            display:block;
            margin-bottom:10px;
        }

        .confidence{
            font-size:18px;
            opacity:0.9;
        }

        footer{
            margin-top:20px;
            font-size:14px;
            color:#ddd;
        }
    </style>
</head>

<body>

<div class="glass-card text-center">

    <h1 class="title">🤖 Sentiment Analyzer</h1>

    

    <form method="POST">

        <textarea
            class="form-control mb-4"
            name="text"
            placeholder="Type your tweet, review, comment or post here...">
        </textarea>

        <button type="submit" class="btn btn-predict">
            Analyze Sentiment 🚀
        </button>

    </form>

    {% if result %}

    <div class="result-card">

        {% if "Positive" in result %}
            <span class="emoji">😊</span>
        {% else %}
            <span class="emoji">😡</span>
        {% endif %}

        <h3>{{ result }}</h3>

        <p class="confidence">
            Confidence Score: <strong>{{ confidence }}</strong>
        </p>

    </div>

    {% endif %}

    <footer>
        Powered by TensorFlow & Flask ⚡
    </footer>

</div>

</body>
</html>
